name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Postgres for the E2E suite: the migrated app's `/app` shell and
    # `/api/catalog/*` call getDb(), which throws without DATABASE_URL. The
    # health check gates steps until the DB accepts connections (no race).
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: sonic
          POSTGRES_PASSWORD: sonic
          POSTGRES_DB: sonic_bloom_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sonic"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # Consumed by `drizzle-kit migrate` and the Playwright-spawned `next dev`.
      # Safe job-wide: the node unit tests manage their own
      # process.env.DATABASE_URL (src/db/client.test.ts deletes it in setup).
      # AUTH_JWT_SECRET is intentionally left UNSET so the middleware's dev
      # allow-through keeps the logged-out E2E specs green; the auth-dependent
      # track-actions tests are deferred (test.fixme) pending an E2E login setup.
      DATABASE_URL: postgresql://sonic:sonic@localhost:5432/sonic_bloom_test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      # L-04: surface known-vulnerable production deps. --omit=dev skips the
      # vite/dev-only advisories that never ship; high+ fails the step.
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Typecheck
        run: npx tsc --noEmit

      # Apply Drizzle migrations to the service Postgres so the E2E dev server
      # boots against a real schema (empty data is fine — data-driven specs
      # seed via localStorage).
      - name: Apply database migrations
        run: npm run db:migrate

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      # `npm run verify` = lint + node-project unit tests + migration tests +
      # E2E + build. The node project is the reliable, exit-0 gate.
      - name: Verify (lint, unit tests, E2E, build)
        run: npm run verify

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore

      - name: Upload Playwright test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          if-no-files-found: ignore

  # Component / view (JSDOM) tests run as a separate, non-blocking job. They
  # carry a known memory leak (see vitest.config.ts) so a failure here must
  # not red the whole pipeline — it is informational until the component
  # suite gets per-file cleanup. Remove continue-on-error once that lands.
  ui-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: UI tests (JSDOM project)
        run: npm run test:ui
